<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mywiki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-alt: #f6f5f4;
    --bg-hover: #f1f0ef;
    --text-primary: rgba(0,0,0,0.95);
    --text-secondary: #615d59;
    --text-muted: #9b9692;
    --accent: #0075de;
    --accent-light: rgba(0,117,222,0.08);
    --accent-hover: #0062ba;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.14);
    --shadow-card: rgba(0,0,0,0.04) 0px 4px 18px, rgba(0,0,0,0.027) 0px 2.025px 7.85px, rgba(0,0,0,0.02) 0px 0.8px 2.93px, rgba(0,0,0,0.01) 0px 0.175px 1.04px;
    --sidebar-w: 260px;
    --radius-card: 12px;
    --radius-btn: 4px;
    --radius-badge: 9999px;
  }

  html { font-size: 16px; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.6;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR (mobile) ─────────────────────────────────── */
  .topbar {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
    flex-shrink: 0;
  }

  .topbar-logo {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text-primary);
    flex: 1;
  }

  .hamburger {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    border-radius: var(--radius-btn);
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .hamburger:hover { background: var(--bg-hover); }

  /* ── LAYOUT ───────────────────────────────────────────── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ──────────────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--bg-alt);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  }

  .sidebar-header {
    padding: 20px 16px 12px;
    flex-shrink: 0;
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    text-decoration: none;
  }

  .sidebar-logo-icon {
    width: 28px;
    height: 28px;
    background: var(--text-primary);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .sidebar-logo-icon svg { color: white; }

  .sidebar-logo-text {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 7px 10px 7px 32px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-btn);
    background: var(--bg);
    font-family: inherit;
    font-size: 13px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,117,222,0.12);
  }

  .sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0 24px;
  }

  .sidebar-nav::-webkit-scrollbar { width: 4px; }
  .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; }

  /* Topic group */
  .nav-topic {
    margin-bottom: 2px;
  }

  .nav-topic-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px 5px 14px;
    cursor: pointer;
    border-radius: var(--radius-btn);
    margin: 0 6px;
    user-select: none;
    transition: background 0.12s;
  }
  .nav-topic-header:hover { background: var(--bg-hover); }

  .nav-topic-chevron {
    color: var(--text-muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .nav-topic.open .nav-topic-chevron { transform: rotate(90deg); }

  .nav-topic-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.1px;
    flex: 1;
  }

  .nav-topic-body {
    display: none;
    padding: 2px 0 4px;
  }
  .nav-topic.open .nav-topic-body { display: block; }

  /* Section header inside topic */
  .nav-section {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 8px 16px 3px 26px;
  }

  /* Article link */
  .nav-article {
    display: block;
    padding: 5px 12px 5px 28px;
    margin: 1px 6px;
    border-radius: var(--radius-btn);
    font-size: 13px;
    color: var(--text-secondary);
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.12s, color 0.12s;
    cursor: pointer;
  }
  .nav-article:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
  }
  .nav-article.active {
    background: rgba(0,117,222,0.1);
    color: var(--accent);
    font-weight: 500;
  }

  /* ── MAIN CONTENT ─────────────────────────────────────── */
  .main {
    flex: 1;
    overflow-y: auto;
    background: var(--bg);
  }

  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; }

  .content-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 48px 96px;
  }

  /* Article header */
  .article-header {
    margin-bottom: 36px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .article-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    padding: 2px 10px;
    border-radius: var(--radius-badge);
    background: var(--accent-light);
    color: var(--accent);
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  .article-date {
    font-size: 12.5px;
    color: var(--text-muted);
    margin-left: auto;
  }

  .article-title {
    font-size: 36px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -2.125px;
    line-height: 1.15;
    margin-bottom: 10px;
  }

  .article-subtitle {
    font-size: 17px;
    color: var(--text-secondary);
    line-height: 1.5;
    font-weight: 400;
  }

  /* ── MARKDOWN BODY ────────────────────────────────────── */
  .article-body {
    font-size: 15.5px;
    line-height: 1.72;
    color: var(--text-primary);
  }

  .article-body h1 {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -1.5px;
    margin: 40px 0 14px;
    color: var(--text-primary);
    line-height: 1.2;
  }

  .article-body h2 {
    font-size: 22px;
    font-weight: 650;
    letter-spacing: -0.8px;
    margin: 36px 0 12px;
    color: var(--text-primary);
    line-height: 1.25;
  }

  .article-body h3 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin: 28px 0 8px;
    color: var(--text-primary);
  }

  .article-body h4 {
    font-size: 15px;
    font-weight: 600;
    margin: 22px 0 6px;
    color: var(--text-primary);
  }

  .article-body p {
    margin-bottom: 16px;
    color: var(--text-primary);
  }

  .article-body a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid rgba(0,117,222,0.25);
    transition: border-color 0.15s, color 0.15s;
  }
  .article-body a:hover {
    color: var(--accent-hover);
    border-color: var(--accent-hover);
  }

  .article-body ul, .article-body ol {
    margin: 0 0 16px 20px;
  }

  .article-body li {
    margin-bottom: 5px;
    padding-left: 4px;
  }

  .article-body li::marker { color: var(--text-muted); }

  .article-body strong { font-weight: 600; }
  .article-body em { font-style: italic; }

  .article-body code {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 13px;
    background: var(--bg-alt);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    color: #d44;
  }

  .article-body pre {
    background: #1e1e2e;
    border-radius: 10px;
    padding: 20px 24px;
    overflow-x: auto;
    margin: 20px 0;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .article-body pre code {
    background: none;
    border: none;
    padding: 0;
    color: #cdd6f4;
    font-size: 13.5px;
    line-height: 1.65;
  }

  .article-body blockquote {
    margin: 20px 0;
    padding: 14px 20px;
    border-left: 3px solid var(--accent);
    background: var(--accent-light);
    border-radius: 0 8px 8px 0;
    color: var(--text-secondary);
    font-style: italic;
  }

  .article-body blockquote p { margin: 0; }

  .article-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 32px 0;
  }

  .article-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    font-size: 14.5px;
  }

  .article-body th, .article-body td {
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  .article-body th {
    font-weight: 600;
    color: var(--text-secondary);
    font-size: 13px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    background: var(--bg-alt);
  }

  .article-body tr:hover td { background: var(--bg-alt); }

  /* ── KEY TAKEAWAYS CALLOUT ─────────────────────────────── */
  .callout-takeaways {
    background: var(--bg-alt);
    border-left: 4px solid var(--accent);
    border-radius: 0 var(--radius-card) var(--radius-card) 0;
    padding: 20px 24px 20px 20px;
    margin: 28px 0;
  }

  .callout-takeaways .callout-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.1px;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 11px;
  }

  .callout-takeaways ul, .callout-takeaways ol {
    margin: 0 0 0 18px;
  }

  .callout-takeaways li {
    font-size: 14.5px;
    color: var(--text-primary);
    margin-bottom: 6px;
  }

  .callout-takeaways p {
    font-size: 14.5px;
    margin: 0;
    color: var(--text-primary);
  }

  /* ── SEE ALSO CARD GRID ───────────────────────────────── */
  .see-also-section {
    margin: 28px 0;
  }

  .see-also-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  .see-also-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }

  .see-also-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    background: var(--bg);
    box-shadow: var(--shadow-card);
    text-decoration: none;
    color: var(--text-primary);
    font-size: 13.5px;
    font-weight: 500;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.12s;
    cursor: pointer;
  }

  .see-also-card:hover {
    border-color: var(--accent);
    box-shadow: rgba(0,117,222,0.12) 0px 4px 18px, var(--shadow-card);
    transform: translateY(-1px);
  }

  .see-also-card-icon {
    width: 28px;
    height: 28px;
    background: var(--accent-light);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* ── LOADING / ERROR STATES ───────────────────────────── */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 40px;
    text-align: center;
    gap: 16px;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 14px;
    color: var(--text-muted);
  }

  .error-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 40px;
    text-align: center;
    gap: 12px;
  }

  .error-icon {
    font-size: 40px;
  }

  .error-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .error-msg {
    font-size: 14px;
    color: var(--text-secondary);
    max-width: 360px;
  }

  /* ── WIKILINK STYLES ──────────────────────────────────── */
  .wikilink {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid rgba(0,117,222,0.3);
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .wikilink:hover {
    color: var(--accent-hover);
    border-color: var(--accent-hover);
  }

  /* ── OVERLAY (mobile sidebar) ─────────────────────────── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 49;
    backdrop-filter: blur(2px);
  }

  /* ── MOBILE ───────────────────────────────────────────── */
  @media (max-width: 768px) {
    body { overflow: auto; height: auto; }

    .topbar { display: flex; }

    .layout { flex-direction: column; overflow: visible; }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 50;
      transform: translateX(-100%);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .overlay.visible { display: block; }

    .main { overflow: visible; }

    .content-wrap {
      padding: 24px 20px 60px;
    }

    .article-title {
      font-size: 26px;
      letter-spacing: -1px;
    }

    .see-also-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 480px) {
    .content-wrap { padding: 20px 16px 60px; }
    .article-title { font-size: 22px; }
  }

  /* ── CHAT PANEL ──────────────────────────────────────── */
  .chat-panel {
    position: fixed;
    right: 0;
    top: 0;
    height: 100vh;
    width: 380px;
    background: #ffffff;
    border-left: 1px solid rgba(0,0,0,0.1);
    box-shadow: rgba(0,0,0,0.04) -4px 0 18px;
    display: flex;
    flex-direction: column;
    z-index: 500;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  .chat-panel.open {
    transform: translateX(0);
  }

  .chat-toggle-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #0075de;
    color: white;
    border: none;
    border-radius: 9999px;
    padding: 12px 20px;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    z-index: 1000;
    transition: background 0.15s, right 0.3s cubic-bezier(0.4,0,0.2,1), box-shadow 0.15s;
    box-shadow: 0 2px 12px rgba(0,117,222,0.25);
  }

  .chat-toggle-btn:hover { background: #005bab; }

  .chat-panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    flex-shrink: 0;
  }

  .chat-panel-header-title {
    font-size: 15px;
    font-weight: 600;
    color: rgba(0,0,0,0.95);
    margin-bottom: 4px;
  }

  .chat-panel-header-article {
    font-size: 13px;
    color: #615d59;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 99px; }

  .chat-message {
    display: flex;
    flex-direction: column;
    max-width: 80%;
  }

  .chat-message.user {
    align-self: flex-end;
    align-items: flex-end;
  }

  .chat-message.assistant {
    align-self: flex-start;
    align-items: flex-start;
  }

  .chat-message.system {
    align-self: center;
    align-items: center;
    max-width: 100%;
  }

  .chat-bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
  }

  .chat-message.user .chat-bubble {
    background: #0075de;
    color: white;
  }

  .chat-message.assistant .chat-bubble {
    background: #f6f5f4;
    color: rgba(0,0,0,0.95);
  }

  .chat-message.system .chat-bubble {
    background: transparent;
    color: #a39e98;
    font-size: 12px;
    text-align: center;
    padding: 4px 0;
  }

  .chat-timestamp {
    font-size: 11px;
    color: #a39e98;
    margin-top: 4px;
    padding: 0 2px;
  }

  .loading-dots {
    display: inline-flex;
    gap: 5px;
    align-items: center;
    padding: 2px 0;
  }

  .loading-dots span {
    width: 7px;
    height: 7px;
    background: #a39e98;
    border-radius: 50%;
    display: inline-block;
    animation: dotPulse 1.2s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  .chat-input-area {
    padding: 12px 16px;
    border-top: 1px solid rgba(0,0,0,0.08);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .chat-textarea {
    flex: 1;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 8px;
    padding: 10px 12px;
    resize: none;
    outline: none;
    line-height: 1.5;
    min-height: 40px;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color 0.15s, box-shadow 0.15s;
    background: #ffffff;
    color: rgba(0,0,0,0.95);
  }

  .chat-textarea:focus {
    border-color: #0075de;
    box-shadow: 0 0 0 3px rgba(0,117,222,0.1);
  }

  .chat-textarea::placeholder { color: #a39e98; }

  .chat-send-btn {
    background: #0075de;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 10px 16px;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
    flex-shrink: 0;
    line-height: 1.5;
  }

  .chat-send-btn:hover:not(:disabled) { background: #005bab; }
  .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Desktop: shift main content when chat is open */
  @media (min-width: 769px) {
    .main {
      transition: margin-right 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .main.chat-open {
      margin-right: 380px;
    }
    .chat-toggle-btn.panel-open {
      right: 404px;
    }
  }

  /* Mobile: panel slides up from bottom */
  @media (max-width: 768px) {
    .chat-toggle-btn.panel-open {

    .chat-panel {

      border-left: none;

      transform: translateY(100%);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .chat-panel.open {
      transform: translateY(0);
    }
  }
</style>
</head>

<script>
// ─────────────────────────────────────────────
// DATA: Wiki structure
// ─────────────────────────────────────────────
const BASE_URL = 'https://raw.githubusercontent.com/rowantrollope/mywiki/main/';

const WIKI_STRUCTURE = [
  {
    id: 'agent-memory',
    label: 'Agent Memory',
    icon: '🧠',
    sections: [
      {
        label: null,
        articles: [
          { path: 'wiki/agent-memory/overview.md', title: 'Overview' }
        ]
      },
      {
        label: 'Concepts',
        articles: [
          { path: 'wiki/agent-memory/concepts/types-of-memory.md', title: 'Types of Memory' },
          { path: 'wiki/agent-memory/concepts/episodic-vs-semantic.md', title: 'Episodic vs Semantic' },
          { path: 'wiki/agent-memory/concepts/working-memory.md', title: 'Working Memory' },
          { path: 'wiki/agent-memory/concepts/long-term-memory.md', title: 'Long-term Memory' },
          { path: 'wiki/agent-memory/concepts/memory-retrieval.md', title: 'Memory Retrieval' }
        ]
      },
      {
        label: 'Architectures',
        articles: [
          { path: 'wiki/agent-memory/architectures/rag.md', title: 'RAG' },
          { path: 'wiki/agent-memory/architectures/vector-stores.md', title: 'Vector Stores' },
          { path: 'wiki/agent-memory/architectures/knowledge-graphs.md', title: 'Knowledge Graphs' },
          { path: 'wiki/agent-memory/architectures/mem0.md', title: 'Mem0' },
          { path: 'wiki/agent-memory/architectures/memgpt.md', title: 'MemGPT' }
        ]
      },
      {
        label: 'Research',
        articles: [
          { path: 'wiki/agent-memory/research/key-papers.md', title: 'Key Papers' },
          { path: 'wiki/agent-memory/research/open-problems.md', title: 'Open Problems' }
        ]
      }
    ]
  }
];

// Flat article list for search
const ALL_ARTICLES = WIKI_STRUCTURE.flatMap(topic =>
  topic.sections.flatMap(section => section.articles)
);

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentPath = null;
let articleCache = {};

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  buildSidebar();
  setupSearch();
  setupMobile();

  // Hash routing
  const hash = window.location.hash.slice(1);
  const initialPath = hash || 'wiki/agent-memory/overview.md';
  loadArticle(initialPath);

  window.addEventListener('hashchange', () => {
    const p = window.location.hash.slice(1);
    if (p && p !== currentPath) loadArticle(p);
  });
});

// ─────────────────────────────────────────────
// SIDEBAR BUILD
// ─────────────────────────────────────────────
function buildSidebar(filterText = '') {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  const q = filterText.toLowerCase().trim();

  WIKI_STRUCTURE.forEach(topic => {
    const topicEl = document.createElement('div');
    topicEl.className = 'nav-topic open';
    topicEl.dataset.topic = topic.id;

    // Count matching articles
    const allTopicArticles = topic.sections.flatMap(s => s.articles);
    const matching = q
      ? allTopicArticles.filter(a => a.title.toLowerCase().includes(q))
      : allTopicArticles;

    if (q && matching.length === 0) return;

    const headerEl = document.createElement('div');
    headerEl.className = 'nav-topic-header';
    headerEl.innerHTML = `
      <svg class="nav-topic-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M4.5 2L8.5 6L4.5 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="nav-topic-label">${topic.icon} ${topic.label}</span>
    `;
    headerEl.addEventListener('click', () => {
      topicEl.classList.toggle('open');
    });

    topicEl.appendChild(headerEl);

    const bodyEl = document.createElement('div');
    bodyEl.className = 'nav-topic-body';

    topic.sections.forEach(section => {
      const articles = q
        ? section.articles.filter(a => a.title.toLowerCase().includes(q))
        : section.articles;

      if (articles.length === 0) return;

      if (section.label) {
        const sectionHeader = document.createElement('div');
        sectionHeader.className = 'nav-section';
        sectionHeader.textContent = section.label;
        bodyEl.appendChild(sectionHeader);
      }

      articles.forEach(article => {
        const link = document.createElement('a');
        link.className = 'nav-article';
        link.textContent = article.title;
        link.dataset.path = article.path;
        if (article.path === currentPath) link.classList.add('active');
        link.addEventListener('click', (e) => {
          e.preventDefault();
          loadArticle(article.path);
          closeSidebar();
        });
        bodyEl.appendChild(link);
      });
    });

    topicEl.appendChild(bodyEl);
    nav.appendChild(topicEl);
  });
}

function updateActiveLink(path) {
  document.querySelectorAll('.nav-article').forEach(el => {
    el.classList.toggle('active', el.dataset.path === path);
  });
}

// ─────────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────────
function setupSearch() {
  const input = document.getElementById('searchInput');
  input.addEventListener('input', () => {
    buildSidebar(input.value);
    updateActiveLink(currentPath);
  });
}

// ─────────────────────────────────────────────
// MOBILE
// ─────────────────────────────────────────────
function setupMobile() {
  const hamburger = document.getElementById('hamburger');
  const overlay = document.getElementById('overlay');

  hamburger.addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    overlay.classList.toggle('visible');
  });

  overlay.addEventListener('click', closeSidebar);
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

// ─────────────────────────────────────────────
// ARTICLE LOADING
// ─────────────────────────────────────────────
async function loadArticle(path) {
  currentPath = path;
  window.location.hash = path;
  updateActiveLink(path);

  const wrap = document.getElementById('contentWrap');
  wrap.innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-text">Loading article...</div>
    </div>
  `;

  try {
    let raw;
    if (articleCache[path]) {
      raw = articleCache[path];
    } else {
      const res = await fetch(BASE_URL + path);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      raw = await res.text();
      articleCache[path] = raw;
    }

    const { frontmatter, body } = parseFrontmatter(raw);
    renderArticle(wrap, frontmatter, body, path);
  } catch (err) {
    wrap.innerHTML = `
      <div class="error-state">
        <div class="error-icon">📄</div>
        <div class="error-title">Couldn't load article</div>
        <div class="error-msg">
          Failed to fetch <code>${path}</code><br>
          <small style="color:var(--text-muted); margin-top:6px; display:block;">${err.message}</small>
        </div>
      </div>
    `;
  }
}

// ─────────────────────────────────────────────
// FRONTMATTER PARSER
// ─────────────────────────────────────────────
function parseFrontmatter(raw) {
  const fm = {};
  let body = raw;

  const match = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
  if (match) {
    const yamlBlock = match[1];
    body = match[2];
    yamlBlock.split('\n').forEach(line => {
      const kv = line.match(/^(\w[\w_-]*):\s*(.+)$/);
      if (kv) {
        let key = kv[1].trim();
        let val = kv[2].trim().replace(/^["']|["']$/g, '');
        if (key === 'tags') {
          // Parse YAML list or inline [a, b, c]
          val = val.replace(/^\[|\]$/g, '').split(',').map(t => t.trim()).filter(Boolean);
        }
        fm[key] = val;
      }
    });
    // Also handle tags as YAML list (- item)
    const tagsBlock = match[1].match(/tags:\s*\n((?:\s*-\s*.+\n?)+)/);
    if (tagsBlock) {
      fm.tags = tagsBlock[1].match(/- (.+)/g)?.map(t => t.replace('- ', '').trim()) || [];
    }
  }

  return { frontmatter: fm, body };
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function renderArticle(wrap, fm, body, path) {
  // Determine title
  const articleInfo = ALL_ARTICLES.find(a => a.path === path);
  const title = fm.title || articleInfo?.title || 'Untitled';
  const tags = Array.isArray(fm.tags) ? fm.tags : (fm.tags ? [fm.tags] : []);
  const lastUpdated = fm.last_updated || fm.updated || fm.date || null;

  // Process the body into sections: Key Takeaways, See Also, rest
  const { mainBody, takeaways, seeAlso } = extractSections(body);

  // Render markdown
  marked.setOptions({
    breaks: true,
    gfm: true,
  });

  let html = marked.parse(processWikilinks(mainBody));

  // Build header
  const tagsHtml = tags.map(t => `<span class="tag">${escHtml(t)}</span>`).join(' ');
  const dateHtml = lastUpdated
    ? `<span class="article-date">Updated ${lastUpdated}</span>`
    : '';

  // Check if there's a lead paragraph (first <p> in the rendered content)
  let subtitleHtml = '';
  const firstP = html.match(/<p>([\s\S]*?)<\/p>/);
  if (firstP && !firstP[1].startsWith('<')) {
    // Don't extract - let it flow naturally
  }

  // Takeaways callout
  let takeawaysHtml = '';
  if (takeaways) {
    const rendered = marked.parse(processWikilinks(takeaways));
    takeawaysHtml = `
      <div class="callout-takeaways">
        <div class="callout-title">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M6 1l1.39 2.82L10.5 4.27l-2.25 2.19.53 3.1L6 8l-2.78 1.56.53-3.1L1.5 4.27l3.11-.45L6 1z" fill="currentColor"/>
          </svg>
          Key Takeaways
        </div>
        ${rendered}
      </div>
    `;
  }

  // See Also cards
  let seeAlsoHtml = '';
  if (seeAlso && seeAlso.length > 0) {
    const cards = seeAlso.map(item => {
      const text = item.replace(/\[\[|\]\]/g, '').trim();
      const article = findArticleByName(text);
      if (article) {
        return `
          <div class="see-also-card" onclick="loadArticle('${article.path}')">
            <div class="see-also-card-icon">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M2 3h10v8H2V3zm2 2h6M4 7h4" stroke="#0075de" stroke-width="1.25" stroke-linecap="round"/>
              </svg>
            </div>
            <span>${escHtml(article.title)}</span>
          </div>
        `;
      } else {
        return `
          <div class="see-also-card">
            <div class="see-also-card-icon">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M2 3h10v8H2V3zm2 2h6M4 7h4" stroke="#0075de" stroke-width="1.25" stroke-linecap="round"/>
              </svg>
            </div>
            <span>${escHtml(text)}</span>
          </div>
        `;
      }
    }).join('');

    seeAlsoHtml = `
      <div class="see-also-section">
        <div class="see-also-title">See Also</div>
        <div class="see-also-grid">${cards}</div>
      </div>
    `;
  }

  wrap.innerHTML = `
    <div class="article-header">
      ${(tagsHtml || dateHtml) ? `<div class="article-meta">${tagsHtml}${dateHtml}</div>` : ''}
      <h1 class="article-title">${escHtml(title)}</h1>
    </div>
    <div class="article-body">
      ${html}
      ${takeawaysHtml}
      ${seeAlsoHtml}
    </div>
  `;

  // Scroll to top
  const main = document.getElementById('mainContent');
  main.scrollTo({ top: 0, behavior: 'smooth' });

  // Notify chat panel of article render
  onArticleRendered(title, path);

  // Attach wikilink click handlers
  wrap.querySelectorAll('.wikilink').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      const target = el.dataset.target;
      const article = findArticleByName(target);
      if (article) loadArticle(article.path);
    });
  });
}

// ─────────────────────────────────────────────
// SECTION EXTRACTOR
// ─────────────────────────────────────────────
function extractSections(body) {
  let mainBody = body;
  let takeaways = null;
  let seeAlso = null;

  // Extract ## Key Takeaways section
  const tkMatch = mainBody.match(/^##\s*Key Takeaways\s*\n([\s\S]*?)(?=\n##\s|\n---|\Z)/m);
  if (tkMatch) {
    takeaways = tkMatch[1].trim();
    mainBody = mainBody.replace(tkMatch[0], '').trim();
  }

  // Extract ## See Also section
  const saMatch = mainBody.match(/^##\s*See Also\s*\n([\s\S]*?)(?=\n##\s|\n---|\Z)/m);
  if (saMatch) {
    const lines = saMatch[1].trim().split('\n')
      .filter(l => l.trim())
      .map(l => l.replace(/^[-*]\s+/, '').trim());
    seeAlso = lines;
    mainBody = mainBody.replace(saMatch[0], '').trim();
  }

  return { mainBody, takeaways, seeAlso };
}

// ─────────────────────────────────────────────
// WIKILINK PROCESSOR
// ─────────────────────────────────────────────
function processWikilinks(text) {
  return text.replace(/\[\[([^\]]+)\]\]/g, (match, target) => {
    const clean = target.trim();
    return `<a class="wikilink" data-target="${escHtml(clean)}" href="#">${escHtml(clean)}</a>`;
  });
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function findArticleByName(name) {
  const q = name.toLowerCase();
  return ALL_ARTICLES.find(a =>
    a.title.toLowerCase() === q ||
    a.path.toLowerCase().includes(q.replace(/\s+/g, '-')) ||
    a.path.toLowerCase().includes(q)
  );
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─────────────────────────────────────────────
// CHAT PANEL
// ─────────────────────────────────────────────
const ANTHROPIC_API_KEY = localStorage.getItem('anthropic_api_key') || '';
const CHAT_MODEL = 'claude-haiku-4-5';

let chatOpen = false;
let chatHistory = [];
let chatCurrentArticlePath = null;
let chatCurrentArticleTitle = null;
let chatCurrentArticleContent = null;
let chatIsLoading = false;

function toggleChat() {
  chatOpen ? closeChat() : openChat();
}

function openChat() {
  chatOpen = true;
  document.getElementById('chatPanel').classList.add('open');
  const btn = document.getElementById('chatToggleBtn');
  btn.textContent = '✕ Close';
  btn.classList.add('panel-open');
  if (window.innerWidth > 768) {
    document.getElementById('mainContent').classList.add('chat-open');
  }
  setTimeout(() => document.getElementById('chatTextarea').focus(), 320);
}

function closeChat() {
  chatOpen = false;
  document.getElementById('chatPanel').classList.remove('open');
  const btn = document.getElementById('chatToggleBtn');
  btn.textContent = '💬 Ask AI';
  btn.classList.remove('panel-open');
  document.getElementById('mainContent').classList.remove('chat-open');
}

function onArticleRendered(title, path) {
  const isNewArticle = chatCurrentArticlePath !== null && path !== chatCurrentArticlePath;

  chatCurrentArticleTitle = title;
  chatCurrentArticlePath = path;

  // Grab rendered text from DOM (after innerHTML is set)
  setTimeout(() => {
    const articleBody = document.querySelector('.article-body');
    chatCurrentArticleContent = articleBody ? articleBody.innerText : '';
  }, 50);

  // Update header subtitle
  document.getElementById('chatArticleTitle').textContent = title;

  if (isNewArticle) {
    chatHistory = [];
    const messagesEl = document.getElementById('chatMessages');
    messagesEl.innerHTML = '';
    appendSystemMessage('New article loaded — chat reset');
  }
}

function appendSystemMessage(text) {
  const messagesEl = document.getElementById('chatMessages');
  const msgEl = document.createElement('div');
  msgEl.className = 'chat-message system';
  msgEl.innerHTML = `<div class="chat-bubble">${escHtml(text)}</div>`;
  messagesEl.appendChild(msgEl);
  scrollChatToBottom();
}

function appendMessage(role, content) {
  const messagesEl = document.getElementById('chatMessages');
  const msgEl = document.createElement('div');
  msgEl.className = `chat-message ${role}`;

  const now = new Date();
  const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  const rendered = role === 'assistant' ? renderChatMarkdown(content) : escHtml(content);

  msgEl.innerHTML = `
    <div class="chat-bubble">${rendered}</div>
    <div class="chat-timestamp">${timeStr}</div>
  `;
  messagesEl.appendChild(msgEl);
  scrollChatToBottom();
}

function renderChatMarkdown(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code style="background:#e8e6e3;padding:1px 5px;border-radius:3px;font-size:12.5px;font-family:monospace;">$1</code>')
    .replace(/\n/g, '<br>');
}

function showLoadingIndicator() {
  const messagesEl = document.getElementById('chatMessages');
  const loadingEl = document.createElement('div');
  loadingEl.className = 'chat-message assistant';
  loadingEl.id = 'chatLoadingIndicator';
  loadingEl.innerHTML = `
    <div class="chat-bubble">
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
  `;
  messagesEl.appendChild(loadingEl);
  scrollChatToBottom();
}

function hideLoadingIndicator() {
  const el = document.getElementById('chatLoadingIndicator');
  if (el) el.remove();
}

function scrollChatToBottom() {
  const messagesEl = document.getElementById('chatMessages');
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function chatSend() {
  if (chatIsLoading) return;
  const textarea = document.getElementById('chatTextarea');
  const text = textarea.value.trim();
  if (!text) return;

  textarea.value = '';
  textarea.style.height = 'auto';

  appendMessage('user', text);
  chatHistory.push({ role: 'user', content: text });

  chatIsLoading = true;
  document.getElementById('chatSendBtn').disabled = true;
  showLoadingIndicator();

  const systemPrompt = `You are Sancho, an AI assistant helping Rowan navigate his personal knowledge wiki.
You have access to the current article's full content.

Current article: ${chatCurrentArticleTitle || 'Unknown'}

Article content:
${chatCurrentArticleContent || '(No content available yet)'}

Answer questions about this article concisely and helpfully. If asked about other topics in the wiki, note that you currently have access to this article only. Keep responses focused and direct — no fluff.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: CHAT_MODEL,
        max_tokens: 1024,
        system: systemPrompt,
        messages: chatHistory
      })
    });

    if (!response.ok) {
      const errData = await response.json().catch(() => ({}));
      throw new Error(errData.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const assistantMessage = data.content?.[0]?.text || '(No response)';

    hideLoadingIndicator();
    appendMessage('assistant', assistantMessage);
    chatHistory.push({ role: 'assistant', content: assistantMessage });

  } catch (err) {
    hideLoadingIndicator();
    appendMessage('assistant', `Sorry, I ran into an issue: ${err.message}. Please try again.`);
  } finally {
    chatIsLoading = false;
    document.getElementById('chatSendBtn').disabled = false;
    textarea.focus();
  }
}

// Wire up chat textarea: auto-resize + keyboard shortcuts
// iOS keyboard fix: shift chat panel up when keyboard appears
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    const panel = document.getElementById('chatPanel');
    if (!panel || !panel.classList.contains('open')) return;
    const offsetFromBottom = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
    panel.style.bottom = offsetFromBottom > 0 ? offsetFromBottom + 'px' : '';
    // Scroll messages to bottom after keyboard opens
    const msgs = document.getElementById('chatMessages');
    if (msgs) setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 50);
  });
  window.visualViewport.addEventListener('scroll', () => {
    const panel = document.getElementById('chatPanel');
    if (!panel || !panel.classList.contains('open')) return;
    const offsetFromBottom = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
    panel.style.bottom = offsetFromBottom > 0 ? offsetFromBottom + 'px' : '';
  });
}

document.addEventListener('DOMContentLoaded', () => {
  const textarea = document.getElementById('chatTextarea');
  const sendBtn = document.getElementById('chatSendBtn');
  const toggleBtn = document.getElementById('chatToggleBtn');

  toggleBtn.addEventListener('click', toggleChat);
  sendBtn.addEventListener('click', chatSend);

  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
  });

  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      chatSend();
    }
  });
});
</script>
